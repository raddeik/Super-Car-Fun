<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Car Parking 3D Visible</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>
// Escena y renderer
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // cielo azul

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luces
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // luz suave general
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(20, 30, 10);
scene.add(directionalLight);

// Suelo grande visible
const floorGeo = new THREE.PlaneGeometry(50, 50);
const floorMat = new THREE.MeshPhongMaterial({color:0x228B22}); // verde césped
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Obstáculos grandes
const obstacles = [];
function addObstacle(x,z,w,d,h){
  const geo = new THREE.BoxGeometry(w,h,d);
  const mat = new THREE.MeshPhongMaterial({color:0x8B0000}); // rojo oscuro
  const box = new THREE.Mesh(geo, mat);
  box.position.set(x,h/2,z);
  scene.add(box);
  obstacles.push(box);
}
addObstacle(5,5,3,3,3);
addObstacle(-5,-5,3,3,3);

// Coche grande y visible
const carGeo = new THREE.BoxGeometry(2,1,4);
const carMat = new THREE.MeshPhongMaterial({color:0xff0000});
const car = new THREE.Mesh(carGeo, carMat);
car.position.set(0,0.5,0);
scene.add(car);

// Cámara detrás del coche
camera.position.set(0, 15, 20);
camera.lookAt(car.position);

// Controles de teclado
const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let carSpeed = 0;
function animate(){
  requestAnimationFrame(animate);

  // Movimiento del coche
  if(keys['w']) carSpeed += 0.1;
  else if(keys['s']) carSpeed -= 0.1;
  else carSpeed *= 0.9;

  if(keys['a']) car.rotation.y += 0.05;
  if(keys['d']) car.rotation.y -= 0.05;

  car.position.x += Math.sin(car.rotation.y) * carSpeed;
  car.position.z += Math.cos(car.rotation.y) * carSpeed;

  // Cámara sigue al coche
  camera.position.x = car.position.x - Math.sin(car.rotation.y)*10;
  camera.position.z = car.position.z - Math.cos(car.rotation.y)*10;
  camera.position.y = car.position.y + 6;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
